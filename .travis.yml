os: linux
dist: xenial
language: node_js
node_js:
  - lts/*

branches:
  only:
    - resource # 触发持续集成的分支

cache:
  directories:
  - node_modules

before_install:
  - export TZ='Asia/Shanghai'

install:
  - npm install hexo-cli -g
  - npm install

script:
  - hexo generate # generate static files

