os: linux
dist: xenial
language: node_js
node_js:
  - lts/*

cache:
  directories:
  - node_modules

before_install:
  - export TZ='Asia/Shanghai'

install:
  - npm install hexo-cli -g
  - npm install

script:
  - hexo generate # generate static files

after_script:
  - cd ./public
  - git init
  - git config --global user.name "Travis CI"
  - git config --global user.email "songyicheng0@gmail.com"
  - git add .
  - git commit -m "Travis CI Auto Builder at $(date +'%Y-%m-%d %H:%M:%S')"
  - git push -f "https://${GH_TOKEN}@${GH_REPO}" master:gh-pages

